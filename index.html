<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Division Donation Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
max-width:900px;
margin:40px auto;
}

h1{
text-align:center;
margin-bottom:5px;
}

h2{
text-align:center;
font-weight:normal;
color:#555;
margin-top:0;
}

h3{
text-align:center;
font-weight:normal;
color:#777;
margin-top:5px;
}

#controls{
text-align:center;
margin-bottom:30px;
}

#chart-container{
max-width:800px;
margin:auto;
}

select{
padding:8px;
font-size:16px;
}

</style>
</head>

<body>

<h1>
DCCA Donation Dashboard
</h1>

<h2>
Division Contribution Tracker
</h2>

<h3>
ASO/DO • BREG • DFI • INS • OAH • OCP • PUC • PVL • RICO • KKB • WFC
</h3>
  
<div id="controls">
Select Date:
<select id="dateSelect"></select>
</div>

<div id="chart-container">
<canvas id="donationChart"></canvas>
</div>

<script>

const divisions=[
"ASO/DO","BREG","DFI","INS","OAH",
"OCP","PUC","PVL","RICO","KKB","WFC"
];

// Color for each division
const divisionColors=[
"#ff6384",
"#36a2eb",
"#ffcd56",
"#4bc0c0",
"#9966ff",
"#ff9f40",
"#8dd17e",
"#f67019",
"#00a950",
"#c9cbcf",
"#b366ff"
];


// ===== ENTER DONATION TOTALS HERE =====

const donationData=[

{
date:"2026-03-01",
totals:{
"ASO/DO":500,
"BREG":300,
"DFI":200,
"INS":400,
"OAH":100,
"OCP":150
}
},

{
date:"2026-03-05",
totals:{
"ASO/DO":800,
"BREG":450,
"DFI":350,
"INS":500,
"OAH":200,
"OCP":300,
"PUC":150
}
},

{
date:"2026-03-10",
totals:{
"ASO/DO":1000,
"BREG":700,
"DFI":450,
"INS":750,
"OAH":350,
"OCP":400,
"PUC":300,
"PVL":200
}
}

];


// Populate Date Dropdown
const dateSelect=document.getElementById("dateSelect");

donationData.forEach((entry,i)=>{
const option=document.createElement("option");
option.value=i;
option.textContent=entry.date;
dateSelect.appendChild(option);
});


// Chart Setup
const ctx=document.getElementById("donationChart");

const chart=new Chart(ctx,{
type:"bar",
data:{
labels:divisions,
datasets:[{
label:"Donations by Division",
data:new Array(divisions.length).fill(0),
backgroundColor:divisionColors
}]
},
options:{
indexAxis:'y',
responsive:true,
plugins:{
legend:{display:false}
},
scales:{
x:{beginAtZero:true}
}
}
});


// Update Chart When Date Changes
function updateChart(index){

const entry=donationData[index];

const values=divisions.map(div=>{
return entry.totals[div] || 0;
});

chart.data.datasets[0].data=values;
chart.update();

}

dateSelect.addEventListener("change",()=>{
updateChart(dateSelect.value);
});


// Load first date
updateChart(0);

</script>

</body>
</html>
